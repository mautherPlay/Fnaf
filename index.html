<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Freddy's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

  <div id="menu-noise"></div>

  <div id="menu-container">

    <header id="menu-header">
      <p id="menu-subtitle">FIVE NIGHTS AT</p>
      <h1 id="menu-title">FREDDY'S</h1>
      <p id="menu-edition">Browser Edition</p>
    </header>

    <main id="night-select">
      <p id="select-label">SELECT NIGHT</p>
      <div id="night-buttons">
        <!-- Populated by the script below -->
      </div>
    </main>

    <footer id="menu-footer">
      <p>Progress is saved automatically in your browser.</p>
      <!--
        TODO Firebase: replace the paragraph above with a login form.
        All Firebase integration points are marked with TODO comments
        inside js/SaveSystem.js — no other file needs to change.
      -->
    </footer>

  </div>

  <!--
    Load order:
      1. EventBus  (SaveSystem emits events)
      2. SaveSystem (reads / writes localStorage)
      3. Inline script (builds the night buttons)
  -->
  <script src="js/EventBus.js"></script>
  <script src="js/SaveSystem.js"></script>
  <script>
  (function () {
    'use strict';

    const save      = new SaveSystem();
    const progress  = save.load();           // { completedNights:[], highestNight:0 }
    const container = document.getElementById('night-buttons');

    for (let n = 1; n <= 5; n++) {
      const unlocked  = save.isNightUnlocked(n);
      const completed = progress.completedNights.includes(n);

      const btn = document.createElement('button');
      btn.className =
        'night-btn' +
        (unlocked  ? ' unlocked'  : ' locked') +
        (completed ? ' completed' : '');

      btn.innerHTML = unlocked
        ? `<span class="night-num">${n}</span>
           <span class="night-label">Night ${n}</span>
           ${completed ? '<span class="night-star">★</span>' : ''}`
        : `<span class="night-num lock-icon">🔒</span>
           <span class="night-label">Night ${n}</span>`;

      if (unlocked) {
        btn.title = completed ? `Night ${n} — completed` : `Start Night ${n}`;
        btn.addEventListener('click', () => {
          window.location.href = 'game.html?night=' + n;
        });
      } else {
        btn.disabled = true;
        btn.title    = `Complete Night ${n - 1} to unlock`;
      }

      container.appendChild(btn);
    }

    // Hidden dev shortcut: SHIFT + click the footer resets all progress
    document.getElementById('menu-footer').addEventListener('click', function (e) {
      if (e.shiftKey && confirm('Reset all progress?')) {
        save.clearAll();
        window.location.reload();
      }
    });

  }());
  </script>
</body>
</html>
