<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Freddy's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>

  <!-- Animated noise overlay -->
  <div id="menu-noise"></div>

  <div id="menu-container">

    <!-- Title -->
    <header id="menu-header">
      <p id="menu-subtitle">FIVE NIGHTS AT</p>
      <h1 id="menu-title">FREDDY'S</h1>
      <p id="menu-edition">Browser Edition</p>
    </header>

    <!-- Night selection -->
    <main id="night-select">
      <p id="select-label">SELECT NIGHT</p>
      <div id="night-buttons">
        <!-- Generated by JS below -->
      </div>
    </main>

    <!-- Footer -->
    <footer id="menu-footer">
      <p>Progress is saved automatically in your browser.</p>
      <!--
        TODO Firebase auth: replace above with login form.
        See js/SaveSystem.js — all Firebase TODO comments are marked.
      -->
    </footer>

  </div>

  <!-- Scripts -->
  <script src="js/EventBus.js"></script>
  <script src="js/SaveSystem.js"></script>
  <script>
    (function () {
      'use strict';

      // SaveSystem needs EventBus globally; both are loaded above.
      const save = new SaveSystem();
      const data = save.load();

      const container = document.getElementById('night-buttons');

      for (let n = 1; n <= 5; n++) {
        const unlocked = save.isNightUnlocked(n);
        const completed = data.completedNights.includes(n);

        const btn = document.createElement('button');
        btn.className = 'night-btn' +
          (unlocked  ? ' unlocked'  : ' locked') +
          (completed ? ' completed' : '');

        // Star for completed nights
        const star = completed ? '<span class="night-star">★</span>' : '';

        // Lock icon for locked nights
        btn.innerHTML = unlocked
          ? `<span class="night-num">${n}</span><span class="night-label">Night ${n}</span>${star}`
          : `<span class="night-num lock-icon">🔒</span><span class="night-label">Night ${n}</span>`;

        if (unlocked) {
          btn.addEventListener('click', () => {
            window.location.href = `game.html?night=${n}`;
          });
          btn.title = completed ? `Night ${n} — completed` : `Start Night ${n}`;
        } else {
          btn.disabled = true;
          btn.title = `Complete Night ${n - 1} to unlock`;
        }

        container.appendChild(btn);
      }

      // Dev helper: hold SHIFT + click footer to reset progress
      document.getElementById('menu-footer').addEventListener('click', (e) => {
        if (e.shiftKey) {
          if (confirm('Reset all progress?')) {
            save.clearAll();
            window.location.reload();
          }
        }
      });
    })();
  </script>
</body>
</html>
